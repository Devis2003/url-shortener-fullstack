version: "3.9"

services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: url_shortener_app
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./tests:/app/tests
      - ./alembic:/app/alembic

    env_file:
      - .env.compose

    depends_on:
      - postgres
      - redis
    
    command: >
        sh -c "
        uv run alembic upgrade head &&
        uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir app
        "

  postgres:
    image: postgres:16
    container_name: url_shortener_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: url_shortener
    ports:
      - "5432:5432"
    volumes:
      - POSTGRESQL_DB:/var/lib/postgresql/data
      

  redis:
    image: redis:7
    container_name: url_shortener_redis
    ports:
      - "6379:6379"
    command: ["redis-server"]
    
volumes:
  POSTGRESQL_DB:  